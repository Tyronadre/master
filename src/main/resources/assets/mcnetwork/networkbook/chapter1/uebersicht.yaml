content: |
  # Netzwerkanwendungen
  
  Netzwerkanwendungen sind Programme, die zum Zweck einer Diensterbringung oder -nutzung innerhalb eines Rechnernetzwerkes miteinander kommunizieren.
  Diese Anwendungen umfassen sowohl den eigentlichen Anwendungszweck bzw. -algorithmus, als auch das Anwendungsprotokoll.
  Sie setzen auf einem Netzwerkprotokollstapel auf und nutzen die darunterliegenden Dienste (Transport, Netz, Link).
  
  ---
  
  ## Anwendungsarchitekturen
  Der Entwickler einer Netzwerkanwendung muss die *Architektur* seiner Anwendung festlegen. Dabei sind normalweise zwei Architekturen zu unterscheiden:
    - Client-Server-Architektur
    - Peer-to-Peer-Architektur
  Je nach Anwendungsfall und -zweck, sowie kommerziellen Überlegungen, kann die eine oder andere Architektur vorteilhafter sein. In der Praxis sehen wir oft Client-Server Architekturen. 
  Außerdem gibt es auch Mischformen, die Elemente beider Architekturen enthalten.
