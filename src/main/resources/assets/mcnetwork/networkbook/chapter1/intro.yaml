content: |
  Im diesem Mod werden die Grundlegen Konzepte der TPC/IP Protokoll Suit behandelt. Dabei gibt es zum einen dieses GuideBook,
  das alle relevanten Informationen zu den entsprechenden Teilgebieten enthält, sowie praktische Anwendungen, die in der
  Welt platziert und benutzt werden können. Die Kapitel in diesem Buch enthalten je einen ausführlichen Abschnitt, mit 
  dem Inhalt des jeweiligen Teilgebiets, sowie einer Zusammenfassung am Ende des jeweiligen Kapitels.
  
  ---
  
  Wollen Sie sich tatsächlichen Datenverkehr und die Protokolle anschauen die dabei benutzt werden, so gibt es 
  Beispielsweise Tools wie Wireshark, mit denen Sie Datenverkehr direkt auf ihrem eigenen Computer sehen können. 
  In diesem Mod wurde versucht realen Datenverkehr möglichst getreu nachzubilden, damit verschieden Netzwerkaufbauten
  problemlos getestet und analysiert werden können. Wir hoffen dadurch einen immersiven Lernerfolg geben zu können.
  
  ---
  
  # 1.1 Einführung 
  
  Die TCP/IP Protokoll Suite erlaubt es allen Computern, die dieses Protokoll beherrschen, miteinender zu kommunizieren.
  Ursprünglich wurde sie in den 1960er als Regierungsprojekt entwickelt, und gewann immer mehr Nutzer. Durch die offene 
  Form und compatibility unabhängig von z.B. Betriebssystem wurde es schnell zur meistgenutzten und damit dominierenden 
  Form der Kommunikation zwischen Computern. Es gibt zwar immer noch andere Netzwerkprotokolle, aber diese werden meist 
  nur lokal und in kleinen oder speziellen Anwendungsfällen genutzt.
  
  ---
  
  # 1.2 Layering
  
  Netzwerkprotokolle werden meist in Schichten definiert. Dabei hat jede Schicht bestimmte Aufgaben die sie erfüllt.
  Die Protoll Suit die wir betrachten besteht aus der Kombination verschiedener Protokolle die wir der Reihe nach 
  näher beleuchten werden. Wir können dabei die Protokolle in 4 Typen einteilen.
  
  ![intro_1.png](intro_1.png)
  
  1. Das Link Layer oder auch Data-Link Layer ist Gerätespezifisch, und umfasst Hardwarefunktionen. Er ist dafür zuständig die Anweisungen des Betriebsystems auf der Hardware in tatsächliche Physische Signale umzusetzten.
  2. Das Network Layer ist für die zustellung von Daten innerhalb des Netzwerks zuständig. Dazu gehört z.B. das Routing von Paketen.
  3. Das Transport Layer ist die Kommunikation von Daten zwischen zwei Endgeräten. Hier sind zwei Protokolle besonders wichtig die wir im entsprechenden Kapitel behandeln werden: TCP und UDP.
  4. Das Application Layer spezifiziert wie eine bestimmte Anwendung kommuniziert. Bekannte Beispiele sind hier HTTP, FTP (File Transfer Protocol) und SMTP (Simple Mail Transfer Protocol)
  
  Jeder dieser Layer arbeitet (in der Theorie) unabhängig voneinder und kann einfach Ausgetauscht werden, sogar ohne das die anderen Schichten dies 'merken' würden.
  Mit jeder Kommunikation wird der Protokollstapel durchlaufen: Auf Gerät A wird einen Internetseite besucht. Nun passiert vereinfacht folgendes:
  
  1. Der Browser wandelt die Anfrage in das HTTP-Protokoll um.
  2. Der Browser gibt diese Anfrage weiter an das Betriebsystem.
  3. Die HTTP-Anfrage wird vom Betriebsystem in eine TCP Paket 'eingepackt'.
  3. Wir nehmen nun an das die Route bekannt ist, und eine Verbindung zwischen den Endgeräten besteht. Wie einen solche Verbindung aufgebaut wird, und wie Routing funktioniert wenn es noch keine Verbindung gibt, betrachten wir zu einem spätern Zeitpunkt.
  4. Das Betriebsystem gibt die Anfrage an den aktuell benutzen Internet-Treiber weiter
  5. Dieser übersetzt die Anfrage in ein sendbares Signal, z.B. in WiFi Funkwellen.
  6. Das Signal landet letzendlich bei dem Server, auf dem der HTTP-Request verarbeitet werden soll.
  7. Der Internet Treiber bekommt das einkommende Signal, und gibt die Empfangenen Daten an das Betriebsystem weiter.
  8. Das Betriebsystem weiß nun das dieses Paket an den HTTP Server weitergeleitet werden soll, entpackt das TCP Paket und gibt das HTTP-Paket an den Server weiter.
  9. Der HTTP Server erhält die Anfrage und antwortet mit einem HTTP-Response Paket. Nun beginnt das ganz wieder von vorne.
  
  Die unteren drei Schichten werden als nicht direkt vom User beeinflusst oder eingestellt, sie sind im System integriert.
  
