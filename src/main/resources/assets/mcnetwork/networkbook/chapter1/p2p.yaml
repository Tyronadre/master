title: Peer to Peer
icon: "icons/book_network_p2p.png"
posX: 200
posY: 200
content: |
  In einem Peer-to-Peer (P2P) System sind alle Teilnehmer gleichberechtigt. Sie sind gleichzeitig Client und Server. Oft gibt es aber abstufungen, und nicht jeder Peer kann jede Anforderung oder Aufgabe übernehmen.
  
  ---
  
  P2P-Systeme lassen sich in unstrukturierte und strukturierete System unterteilen. Dabei bedeuted unstrukturiert, dass es keine feste Hierachie oder Verteilung der Peers gibt, und sich der Netzwerkaufbau ständig verändern kann. 
  Unstrukturierte Systeme lassen sich weiter unterteilen:
  - Zentralisierte P2P-System: Benötigen einen zentralen Server der Verwaltungsaufgaben übernimmt. 
  - Reine P2P-System: Haben keine zentrale Instanz. Durch z.B. ein Overlay-Netz werden aufgaben zugeteilt.
  - Hybride/Hierarchische P2P-System: Haben mehrere zentrale Peers die Verwaltungsaufgaben übernehmen.
  
  Strukturierte System sind alle Verbindungen bekannt, und es gibt z.B. einen zentralen Index, der berechnet wird, und über den dann Aufgaben zugeteilt werden können.