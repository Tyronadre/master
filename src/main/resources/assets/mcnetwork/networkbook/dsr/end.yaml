  # DSR – Analyse

  DSR ermöglicht es zusätzlich zu den aufgezeigen Features im Mod, Kontrollpakete und Datenpakete zusammen zu senden. Beispielsweise kann ein einzelnes UDP Paket einfach direkt mit dem RREQ versendet werden. Somit kann der Overhead weiter minimiert werden.
  Auch verschiedene Kontrollmessages können in einem Paket gesendet werden.
  Es gibt außerdem verschiedene Modi und Erweiterungen die nicht umgesetzt wurden, die verschiedene Probleme des Protokolls zu umgehen versuchen.

  ---

  ## Eigenschaften

  - Arbeitet ausschließlich On-Demand.
  - Einfache Lösung um immer loop freie Netzwerkpfade zu erhalten
  - Erlaubt uni- und bidirektionale Verbindungen zwischen Nodes.

  - On-Demand Routing hat eine hohe Verzögerung, bis Daten gesendet werden können.
  - Pakete mit langen Routen haben einen größeren Overhead.

  ---
