"content": "# DSR – Analyse\n\nDSR ermöglicht es zusätzlich zu den aufgezeigen Features\
  \ im Mod, Kontrollpakete und Datenpakete zusammen zu senden. Beispielsweise kann\
  \ ein einzelnes UDP Paket einfach direkt mit dem RREQ versendet werden. Somit kann\
  \ der Overhead weiter minimiert werden.\nAuch verschiedene Kontrollmessages können\
  \ in einem Paket gesendet werden.\nEs gibt außerdem verschiedene Modi und Erweiterungen\
  \ die nicht umgesetzt wurden, die verschiedene Probleme des Protokolls zu umgehen\
  \ versuchen.\n\n---\n\n## Eigenschaften\n\n- Arbeitet ausschließlich On-Demand.\n\
  - Einfache Lösung um immer loop freie Netzwerkpfade zu erhalten\n- Erlaubt uni-\
  \ und bidirektionale Verbindungen zwischen Nodes.\n\n- On-Demand Routing hat eine\
  \ hohe Verzögerung, bis Daten gesendet werden können.\n- Pakete mit langen Routen\
  \ haben einen größeren Overhead.\n\n---\n"
