  # Route Reply (RREP)

  ---
  
  Sobald das Ziel erreicht ist, wird eine **Route Reply (RREP)** erzeugt.
  
  ![rreq](rreq_3.png)
  ![rrep](rrep_3.png)
  
  ## Ablauf

  - Die Route die im RREQ enthalten ist, wird invertiert und im RREQ Paket gespeichert.
  - Dieses RREQ Paket wird per Unicast zurück an den Sender geschickt.
  - Wird auf dem Rückweg durch einen Unidirektionalen Link der Weg unterbrochen, wird von dieser Stelle ein neuer RREQ gestartet. Die Route im RREP wird allerdings nicht geändert.
  
  ---
  
  ## Aufgabe
  
  Baue eine Netzwerk mit drei Knoten, und untersuche RREQ und RREP verhalten
  
