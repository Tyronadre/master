  # Route Reply (RREP)

  ---
  
  Sobald das Ziel erreicht ist, wird eine **Route Reply (RREP)** erzeugt.

  ---
  
  ## Ablauf

  - Ziel erhält vollständige Route
  - Route wird im RREP zurückgesendet
  - Sender speichert diese Route

  ---
  
  ![Ein Paket bewegt sich entlang des gefundenen Pfades zurück](image:dsr_rrep_return)

  ---
  
  ## Ergebnis

  Der Sender kennt nun den gesamten Pfad:

  **z. B.: A → B → C → D**

  ---
  
  ## Nutzung

  Alle zukünftigen Pakete enthalten diese Route direkt.

  ---
  
