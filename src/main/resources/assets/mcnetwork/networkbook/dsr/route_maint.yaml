"content": "# Route Maintenance und Cache\n\n![Route Error](rerr1.png)\n\nWenn ein\
  \ Knoten Daten über eine Verbindung weiterleiten soll, die nicht mehr existiert,\
  \ passiert folgendes:\n\n- Der Knoten bemerkt, dass die Verbindung nicht mehr exisitert.\n\
  - Er sendet ein Route Error Paket **(RERR)** zurück an den Sender des ursprünglichen\
  \ Datenpakets.\n- Alle Knoten die dieses Paket auf dem Weg mithören, löschen die\
  \ unterbrochene Verbindung aus ihrem Cache. \n- Wenn der Sender des Datenpakets\
  \ das **RERR** Pakt erhält, so löscht er ebenfalls diese Verbindung, und kann eine\
  \ neue Route Discovery. Da wir in der Simulation UDP verwenden, passiert dies allerdings\
  \ nicht direkt. Der Knoten speichert keine Informationen darüber welche Pakete er\
  \ gesendet hat und weiß dementsprechend nicht, dass das gesendete Datenpaket 'verloren\
  \ gegangen' ist.\n\n---\n\nDas bedeutet aber auch, das zunächst nur alle Knoten\
  \ auf dem direkten Weg wissen, dass die Verbindung unterbrochen ist. Wenn es andere\
  \ Knoten gibt, die auch diese Verbindung genutzt haben, erfahren sie erst das sie\
  \ unterbrochen ist, wenn diese Knoten selber Daten senden und deshalb dann ein **RERR**\
  \ Paket erhalten.\n\n---"
