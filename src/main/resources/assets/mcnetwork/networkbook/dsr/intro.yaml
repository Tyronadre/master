  # DSR – Einführung

  ---
  
  **DSR (Dynamic Source Routing)** ist ein **reaktives Routing-Protokoll**.

  Wie bei AODV gilt:
  
  **Routen werden nur bei Bedarf aufgebaut.**

  ---
  
  ## Zentrale Besonderheit

  Im Gegensatz zu AODV speichert DSR den **kompletten Pfad im Paket selbst**.

  → Dieses Verfahren nennt man **Source Routing**

  ---
  
  ![Ein Paket, das eine vollständige Liste von Knoten enthält, die es durchläuft](image:dsr_source_routing)

  ---
  
  ## Konsequenz

  - Kein Bedarf für klassische Routingtabellen
  - Jeder Knoten folgt einfach dem vorgegebenen Pfad

  ---
  
  ## Einordnung

  | Typ | Beispiel |
  |-----|----------|
  | Reaktiv | AODV, DSR |
  | Proaktiv | OLSR |

  ---
  
  @task[Ist DSR reaktiv oder proaktiv?|Reaktiv;Was ist die Besonderheit von DSR?|Der komplette Pfad steht im Paket]