  # Route Discovery in DSR

  ---
  
  Wenn ein Knoten keine Route kennt, startet er einen **Route Request (RREQ)**.
  
  ![rreq](rreq_3.png)
  
  ## Ablauf

  1. Sender erstellt ein RREQ  
  2. RREQ wird als **Broadcast** verschickt  
  3. Jeder Knoten fügt sich selbst zur Route hinzu  

  Der RREQ enthält am Ende den vollständigen Weg zum Ziel.
  
  Um übermäßiges Flooden zu vermeiden, beinhalten RREQ eine Identification Value. Pakete die die selbe Zieladdress und ID haben werden nur einmal pro Node verarbeitet.
  Außerdem wird die TTL schrittweise erhöht, um nicht direkt das ganze Netzwerk zu flooden.
  
