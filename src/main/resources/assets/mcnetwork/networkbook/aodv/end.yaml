  # AODV – Analyse

  ---
  
  AODV zeigt spezifisches Verhalten in Netzwerken.

  ---
  
  ## Eigenschaften

  | Eigenschaft | Bewertung |
  |------------|----------|
  | Overhead | Niedrig bei wenig Verkehr |
  | Reaktionszeit | Höher bei neuer Route |
  | Skalierung | Gut |
  | Stabilität | Abhängig von Mobilität |

  ---
  
  ![Vergleich verschiedener Routingpfade und deren Effizienz](image:aodv_analysis_paths)

  ---
  
  ## Beobachtungen in MCNetwork

  - Initiale Verzögerung durch Route Discovery
  - Effiziente Nutzung bestehender Routen
  - Häufige Neuberechnung bei Bewegung

  ---
  
  ## Einordnung

  AODV eignet sich besonders für:

  - dynamische Netzwerke
  - sporadische Kommunikation

  ---
  
  @task[Wann ist AODV effizient?|Bei wenig dauerhaftem Verkehr;Warum gibt es Verzögerung?|Route muss erst gefunden werden]