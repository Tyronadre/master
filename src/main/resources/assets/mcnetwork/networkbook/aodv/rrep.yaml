"content": "# Route Reply (RREP)\n\n![Route Reply](rrep1.png)\n\nSobald das Ziel erreicht\
  \ wird, wird eine **Route Reply (RREP)** erzeugt.\n\nDurch die Weiterleitung des\
  \ **RREQ** ist ein Pfad zum Sender dessen bekannt. Dieser wird nun Rückwärts entlang\
  \ gegangen. Dabei wird die tatsächliche *Sequence Number* für den Zielknoten, der\
  \ im **RREP** enthalten ist, in jedem Knoten auf dem Weg gespeichert.\n\n---\n\n\
  ## Wichtig\n\nBeim Rückweg entsteht eine **gültige Route**:\n\n- Jeder Knoten speichert\
  \ den nächsten Hop\n- Eine durchgehende Verbindung entsteht\n---\n"
