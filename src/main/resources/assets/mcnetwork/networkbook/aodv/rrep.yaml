  # Route Reply (RREP)

  ---
  
  Sobald das Ziel erreicht wird, wird eine **Route Reply (RREP)** erzeugt.

  ---
  
  ## Ablauf

  - Zielknoten empfängt RREQ
  - Antwort wird erstellt
  - Antwort läuft den Weg **zurück zum Ursprung**

  ---
  
  ![Ein Paket bewegt sich entlang eines Pfades zurück zum Sender](image:aodv_rrep_path)

  ---
  
  ## Wichtig

  Beim Rückweg entsteht eine **gültige Route**:

  - Jeder Knoten speichert den nächsten Hop
  - Eine durchgehende Verbindung entsteht

  ---
  
  ## Ergebnis

  Der Sender kennt nun eine Route zum Ziel.

