  # AODV – Einführung

  ---
  
  **AODV (Ad hoc On-Demand Distance Vector)** ist ein **reaktives Routing-Protokoll**.

  Das bedeutet:
  
  **Routen werden nur dann erstellt, wenn sie benötigt werden.**

  ---
  
  ## Grundidee

  - Kein vollständiges Routing-Wissen im Voraus
  - Netzwerk wird nur bei Bedarf durchsucht
  - Fokus auf Effizienz bei dynamischen Netzwerken

  ---
  
  ![Ein Netzwerk ohne feste Routen, bei dem nur bei Bedarf Verbindungen aufgebaut werden](image:aodv_basic_concept)

  ---
  
  ## Vorteile

  | Vorteil | Beschreibung |
  |--------|-------------|
  | Geringer Overhead | Keine dauerhaften Updates |
  | Skalierbarkeit | Gut für große Netzwerke |
  | Anpassungsfähigkeit | Reagiert auf Änderungen |

  ---
  
  ## Einordnung

  | Typ | Beispiel |
  |-----|----------|
  | Reaktiv | AODV, DSR |
  | Proaktiv | OLSR |

