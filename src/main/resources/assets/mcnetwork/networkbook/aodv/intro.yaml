"content": "# Einführung\n\n---\n\nAODV (Ad hoc On-Demand Distance Vector) ist ein\
  \ **reaktives** Routing-Protokoll.\n\nDas bedeutet: Routen werden nur dann erstellt,\
  \ wenn sie benötigt werden.\n\n---\n\n## Grundidee\n\n- Kein vollständiges Routing-Wissen\
  \ im Voraus\n- Netzwerk wird nur bei Bedarf durchsucht\n- Fokus auf Effizienz bei\
  \ dynamischen Netzwerken\n- Alle Nodes verhalten sich gleich\n- Setzt bidirektionale\
  \ Links voraus\n\n![AODV HUD](node1.png)\n\n---\n"
