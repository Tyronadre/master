  # Routingtabellen und Sequenznummern

  ---
  
  Jeder Knoten speichert Informationen in einer **Routingtabelle**.

  ---
  
  ## Aufbau einer Tabelle

  | Ziel | Nächster Hop | Distanz | Sequenznummer |
  |------|--------------|--------|---------------|

  ---
  
  ## Sequenznummern

  Sie geben an, **wie aktuell eine Route ist**.

  - Höhere Nummer = neuere Information
  - Verhindert veraltete Routen

  ---
  
  ![Darstellung einer Tabelle mit Routinginformationen](image:aodv_routing_table)

  ---
  
  ## Bedeutung

  Ohne Sequenznummern könnten:

  - Schleifen entstehen
  - alte Informationen genutzt werden

