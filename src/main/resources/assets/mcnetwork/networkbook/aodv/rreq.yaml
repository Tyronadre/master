"content": "# Route Discovery (RREQ)\n\n---\n\nWenn ein Knoten keine Route kennt,\
  \ startet er einen **Route Discovery** mithilfe eines RREQ Pakets.\n\n![AODV RREQ](rreq1.png)\n\
  \n## Ablauf\n\n1. Zunächst erstellt die Node ein RREQ Paket. Die Zieladdress des\
  \ Pakets wird dabei auf das Ziel der Route Discovery gesetzt. \n2. Dieses Paket\
  \ wird per Broadcast an alle Nachbarn gesendet. Um übermäßiges Flooding zu vermeiden\
  \ werden dabei zwei Mechanismen angewandt: \n- Die TTL ist initial 1 und wird schrittweise\
  \ um 2 erhöht.\n- Pakete mit der selben Zieladdress und Sequence Number werden nicht\
  \ erneut gebroadcasted.\n3. Knoten die das Paket empfangen speichern Informationen\
  \ dazu ab. Dies wird gleich genauer erklärt.\n4. Sobald das Paket den Zielknoten\
  \ erreicht, sendet dieser eine Route Reply.\n\nKnoten, die einen Pfad zum Zielknoten\
  \ des RREQ kennen, können diesen direkt zurückgeben, um unnötiges Flooding zu verhindern.\n\
  \n---\n\n## Verarbeiten von RREQ Paketen\n\nNehmen wir folgendes Netzwerk an: `A-B-C-D`.\n\
  \nWill Knoten A nun Daten an Knoten D senden, so erstellt er ein RREQ Paket. Knoten,\
  \ die dieses Paket empfangen, können daraus Informationen ziehen und in ihrem Routing\
  \ Table speichern. Empfängt C den RREQ kann es folgende Informationen speichern:\n\
  - Die Verbindung zum vorangehenden Hop, also ihrem direkten Nachbarn, in diesem\
  \ Fall B.\n- Das der Nachbar über den sie das Paket erhalten haben einen Pfad zum\
  \ Startknoten hat, in diesem Fall kann A über B erreicht werden.\n\nSomit können\
  \ schrittweise Routingtabellen aufgebaut werden, durch die dann auch zukünftige\
  \ Anfragen schneller beantwortet werden können.\n\n---\n\n## Daten im HUD\n\n- `Flags`:\
  \ Können bis auf U ignoriert werden. U ist gesetzt, wenn der Sender die Destination\
  \ Sequence Number nicht kennt.\n- `Hops`: Wie wieviele Hops das Paket zurückgelegt\
  \ hat.\n- `SQ Number`: Die Sequence Number für die Sender bzw Ziel Node.\n- `RREQ\
  \ ID`: Die ID des Route Requests. Mit diesem und der Address des Senders können\
  \ mehrfach empfangene Pakete identifiziert werden.\n\n---\n"
