  # Datenpakete im Netzwerk

  ---
  
  **Fliegende Pakete** visualisieren den Datenverkehr zwischen Knoten.

  Sie zeigen in Echtzeit, wie Informationen durch das Netzwerk übertragen werden.

  
  ![HUD](packet_hud.png)

  ---
  
  ## Bedeutung

  Ein Paket ist immer in genau einen Netzwerk Frame eingebunden. Aktuell werden ausschließlich UDP Frames verwendet, um den durch TCP entstehenden Overhead nicht visualisieren und verstehen zu müssen. 
  In der obersten Zeile wird dabei die Herkunfts- und Zieladresse des Frames gezeigt, sowie die verbleiben Time To Live (TTL).
  
  Darunter werden PaketTyp, ID, sowie Herkunfts- und Zieladresse des Pakets angezeigt.
  Der Rest des HUDs wird mit paketspezifischen Informationen gefüllt.
  
  --- 
  
  ## Kollision
  
  Frames können an ihrer Zieladresse kollidieren, wenn dort in der selben Zeiteinheit bereits zu viele Frames angekommen sind. Diese Frames bleiben einen Moment an der Zieladresse stehen, und werden rot markiert.
  
  ![error packet](packet_hud_error.png)
