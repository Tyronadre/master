"content": "# Routing und mobile Netzwerke\n\n---\n\n**Routing** beschreibt den Prozess,\
  \ mit dem ein Datenpaket seinen Weg durch ein Netzwerk findet.\n\nEin Netzwerk kann\
  \ als **Graph** betrachtet werden:\n\n- Knoten (Nodes) = Computer\n- Kanten (Edges)\
  \ = Verbindungen\n\n## Pfade und Entscheidungen\n\nEin Paket kann oft mehrere Wege\
  \ zum Ziel nehmen.\n\nRouting-Protokolle entscheiden:\n\n- welcher Pfad gewählt\
  \ wird\n- wann ein neuer Pfad gesucht wird\n- wie mit Fehlern umgegangen wird\n\n\
  ---\n\n## Mobile Netzwerke (MANET)\n\nIn einem **mobilen Netzwerk** können sich\
  \ die Knoten bewegen.\n\nDas bedeutet:\n\n- Verbindungen entstehen und verschwinden\n\
  - Topologien ändern sich ständig\n- stabile Routen sind nicht garantiert\n\n---\n\
  \n![Ein Netzwerk](network.png)\n\n---\n\n## Herausforderungen\n\n| Problem | Beschreibung\
  \ |\n|--------|-------------|\n| Dynamik | Netzwerk ändert sich laufend |\n| Reichweite\
  \ | Knoten sind nur lokal verbunden |\n| Ausfälle | Verbindungen brechen ab |\n\
  | Overhead | Kommunikation für Routing kostet Ressourcen |\n\n---\n\n## Routing-Strategien\n\
  \nEs gibt unterschiedliche Ansätze:\n\n- **Reaktiv** (z. B. AODV, DSR)  \n  → Routen\
  \ werden bei Bedarf gesucht\n\n- **Proaktiv** (z. B. OLSR)  \n  → Routen werden\
  \ ständig aktuell gehalten\n\n- **Geografisch** (z. B. LAR)  \n  → Positionen werden\
  \ genutzt\n\n---\n\n## Bedeutung für MCNetwork\n\nIn der Simulation kannst du beobachten:\n\
  \n- wie sich Routen verändern\n- wie Protokolle auf Unterbrechungen reagieren\n\n\
  ---\n- welche Strategie effizienter ist"
