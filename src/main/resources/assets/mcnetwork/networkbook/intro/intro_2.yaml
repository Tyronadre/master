  # Simulation Controller

  ---
  
  Der **Simulation Controller** steuert den Ablauf der Netzwerksimulation.

  Er erlaubt dir, das Verhalten der Protokolle gezielt zu analysieren.

  ---
  
  ## Funktionen

  - Simulation **starten / pausieren**
  - **Geschwindigkeit anpassen**
  - Zeitverlauf kontrollieren

  ---
  
  ![Ein technisches Item mit Zeit- oder Kontrollsymbol](image:simulation_controller_item)

  ---
  
  ## Warum ist das wichtig?

  Netzwerkprotokolle sind **zeitabhängig**.

  Durch Kontrolle kannst du:
  
  - einzelne Schritte beobachten
  - Routing-Entscheidungen nachvollziehen
  - Unterschiede zwischen Protokollen erkennen

  ---
  
  ## Beispiel

  | Zustand | Effekt |
  |--------|--------|
  | Pause | Keine Paketbewegung |
  | Langsam | Details sichtbar |
  | Schnell | Gesamtablauf beobachten |

  ---
  
