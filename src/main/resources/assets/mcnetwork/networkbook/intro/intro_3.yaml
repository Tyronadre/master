  # Computerblock als Netzwerkknoten

  ![Computer](computer.png)

  ---
  
  Der **Computerblock** repräsentiert einen Computer im Netzwerk. 
  
  Aus topologischer Sicht ist jeder Block eine eigenständige **Node**, die:

  - Daten senden und empfangen kann
  - Routing-Entscheidungen trifft
  - Teil eines größeren Netzwerks ist

  ---
  
  ## Terminal

  Jeder Computerblock besitzt ein **Terminal**.
  
  ![Terminal](terminal.png)
  
  Mit diesem können Informationen abgefragt werden oder verschieden Netzwerkbefehle ausgeführt werden.

  Dazu zählen z.B.:
  - Ping
  - Traceroute
  - IpConfig

  Commands können mit Tab vervollständigt werden, und mit Pfeiltasten können vorher ausgeführte Commands durchgelaufen werden.
  Mit STRG+C können laufende Commands unterbrochen werden.
  
  ---
  
  ## HUD-Display
  
  ![HUD](computer_hud.png)
  Ein Computerblock besitzt ein HUD - Display das Informationen zum aktuellen Protkoll anzeigt.
