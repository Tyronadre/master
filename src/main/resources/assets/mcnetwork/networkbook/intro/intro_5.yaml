"content": "# Zusammenspiel der Komponenten\n\n---\n\nIn MCNetwork arbeiten alle Komponenten\
  \ zusammen, um ein Netzwerk zu simulieren.\n\n---\n\n## Ablauf einer Simulation\n\
  \n1. Das Proktoll wird mit dem Controller Item gewählt.\n2. Mit einem Computer wird\
  \ z.B. ein Ping ausgeführt.\n3. Das Routingprotkoll entscheidet, welchen Weg Pakete\
  \ nehmen, oder ob z.B. ein Kontrollpaket geschickt werden muss, um eine Route zu\
  \ finden.\n4. Pakete bewegen sich durch das Netzwerk, jeweils von dem entsprechenden\
  \ Routingprotokoll kontrolliert.\n\n---\n\n![Ein Netzwerk](network.png)\n\n---\n\
  \n## Zentrale Fragestellung\n\nWie unterscheiden sich die Protokolle in ihrem Verhalten?\n\
  \n- Finden sie immer den kürzesten Weg?\n- Wie reagieren sie auf Änderungen?\n-\
  \ Wie viel Kommunikation ist notwendig?\n"
