  # Zusammenspiel der Komponenten

  ---
  
  In MCNetwork arbeiten alle Komponenten zusammen, um ein Netzwerk zu simulieren.

  ---
  
  ## Ablauf einer Simulation
  
  1. Das Proktoll wird mit dem Controller Item gewählt.
  2. Mit einem Computer wird z.B. ein Ping ausgeführt.
  3. Das Routingprotkoll entscheidet, welchen Weg Pakete nehmen, oder ob z.B. ein Kontrollpaket geschickt werden muss, um eine Route Discovery durchzuführen.
  4. Pakete bewegen sich durch das Netzwerk, jeweils von dem entsprechenden Routingprotokoll kontrolliert.

  ---
  
  ![Ein Netzwerk](network.png)

  ---
  
  ## Zentrale Fragestellung

  Wie unterscheiden sich die Protokolle in ihrem Verhalten?

  - Finden sie immer den kürzesten Weg?
  - Wie reagieren sie auf Änderungen?
  - Wie viel Kommunikation ist notwendig?
