"content": "# Erweiterungen\n\n- **Adaptive Request Zone**: Beim Weiterleiten des\
  \ RREQ wird die Request Zone durch den weiterleitenden Knoten geändert, weil dieser\
  \ aktuellere Informationen über das Ziel hat.  \n- **Query Localization**: Wenn\
  \ ein bekannter Pfad abbricht, kann der neue nur maximal x mal neue Knoten benutzen.\
  \ Damit wird dafür gesorgt, das eine neue Route nahe an der alten liegt.\n\n---\n"
