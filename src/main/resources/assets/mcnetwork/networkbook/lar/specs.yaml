  # Vorteile und Grenzen von LAR

  ---
  
  LAR optimiert klassische Routing-Verfahren durch räumliche Einschränkung.

  ---
  
  ## Vorteile

  | Vorteil | Beschreibung |
  |--------|-------------|
  | Geringer Overhead | Weniger Broadcast |
  | Effizienz | Schnellere Routensuche |
  | Skalierbarkeit | Gut für große Netzwerke |

  ---
  
  ## Grenzen

  | Problem | Beschreibung |
  |--------|-------------|
  | Positionsfehler | Falsche Schätzung |
  | Mobilität | Schnelle Bewegung erschwert Vorhersage |
  | Abhängigkeit | Benötigt Positionsdaten |

  ---
  
