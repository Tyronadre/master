"content": "# Request Zone\n\n---\n\nLAR definiert eine sogenannte **Request Zone**.\n\
  \n---\n\n## Definition\n\nDie Request Zone ist der Bereich, in dem das RREQ weitergeleitet\
  \ wird.\n\n---\n\n## Berechnung\n\nBasierend auf:\n\n- letzter bekannter Position\
  \ des Ziels\n- möglicher Bewegung des Ziels\n\n---\n\n![Request Zone](schema1.png)\n\n---\n\n##\
  \ Verhalten\n\n- Knoten **innerhalb** der Zone → leiten weiter  \n- Knoten **auß\
  erhalb** → ignorieren das Paket  \n\n---\n\n## Effekt\n\nDeutlich weniger Netzwerkverkehr\
  \ im Vergleich zu Broadcast.\n\n---\n"
