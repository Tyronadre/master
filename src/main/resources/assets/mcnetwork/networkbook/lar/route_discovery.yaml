"content": "# Route Discovery\n\nFür jeden Ziel Knoten D gibt es eine 'Expected Zone'.\
  \ Es wird davon ausgegangen das der Knoten sich innerhalb dieser Zone befindet.\
  \ Diese Zonen sind abhängig von vorherigen Information und Bewegungsvektoren des\
  \ Knoten.\n\nRREQ werden nur innerhalb einer limitieren 'Request Zone' weitergeleitet,\
  \ die die Expected Zone und die Position des Sender miteinschließt.\n\n![Zonen](schema1.png)\n\
  \nX: Letzte bekannte Position von D\n\nY/D: Tatsächliche Position von D\n\nr = (t1\
  \ - t0) x v, wobei v die vermutete Geschwindigkeit ist.\n\nHier leitet also B das\
  \ RREQ Paket weiter, A aber nicht.\n\nSchlägt eine Route Discovery fehl, so wird\
  \ sie nach einem Timeout mit einer größeren Request Zone erneut gestartet.\n\nAnsonsten\
  \ funktioniert das Routing äquivalent zu DSR.\n\n---\n"
