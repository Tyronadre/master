  # LAR – Analyse

  ---
  
  LAR zeigt stark situationsabhängiges Verhalten.

  ---
  
  ## Eigenschaften

  | Eigenschaft | Bewertung |
  |------------|----------|
  | Overhead | Sehr gering bei guter Schätzung |
  | Reaktionszeit | Schnell |
  | Robustheit | Abhängig von Positionsgenauigkeit |
  | Skalierung | Sehr gut |

  ---
  
  ![Ein Netzwerk mit effizienter und ineffizienter Suche im Vergleich](image:lar_analysis_efficiency)

  ---
  
  ## Beobachtungen in MCNetwork

  - Sehr effizient bei stabilen Bewegungsmustern
  - Probleme bei unvorhersehbarer Mobilität
  - Deutlich weniger Pakete als AODV/DSR

  ---
  
  ## Einordnung

  LAR eignet sich besonders für:

  - große Netzwerke
  - Szenarien mit bekannten Positionsdaten

  ---
  
  @task[Wann ist LAR besonders effizient?|Bei genauer Positionsschätzung;Was beeinflusst die Leistung?|Die Genauigkeit der Position]