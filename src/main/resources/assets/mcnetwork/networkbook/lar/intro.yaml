  - "Routing und mobile Netzwerke"
"content": "# LAR\n\nLAR (Location-Aided Routing) ist ein **reaktives** Routing-Protokoll,\
  \ das Positionsinformationen nutzt.\n\n- Nodes müssen ein Mittel zur Positionsbestimmung\
  \ haben, z.B. GPS.\n- Nodes müssen nicht uniform sein.\n- Das Verhalten ist auf\
  \ DSR basiert, mit zusätzlichen Filtern beim Flooden, basierend auf der Position\
  \ der Nodes.\n\n---\n\nDieses Protokoll ist aktuell nicht umgesetzt.\n\n---\n"
