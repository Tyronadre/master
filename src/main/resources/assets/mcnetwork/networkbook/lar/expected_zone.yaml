  # Expected Zone

  ---
  
  Die **Expected Zone** beschreibt den Bereich, in dem sich das Ziel wahrscheinlich befindet.

  ---
  
  ## Grundlage

  - Letzte bekannte Position
  - Bewegungsgeschwindigkeit
  - Zeit seit letzter Information

  ---
  
  ![Ein Kreis oder Bereich um die letzte bekannte Position eines Knotens](image:lar_expected_zone)

  ---
  
  ## Zusammenhang

  - Expected Zone → Schätzung der Zielposition  
  - Request Zone → tatsächlicher Suchbereich  

  ---
  
  ## Bedeutung

  Je genauer die Expected Zone:

  - desto effizienter das Routing
  - desto geringer der Overhead

  ---
  
