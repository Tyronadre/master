"content": "# Expected Zone\n\n---\n\nDie **Expected Zone** beschreibt den Bereich,\
  \ in dem sich das Ziel wahrscheinlich befindet.\n\n---\n\n## Grundlage\n\n- Letzte\
  \ bekannte Position\n- Bewegungsgeschwindigkeit\n- Zeit seit letzter Information\n\
  \n---\n\n![Expected Zone](expected_zone.png)\n\
  \n---\n\n## Zusammenhang\n\n- Expected Zone → Schätzung der Zielposition  \n- Request\
  \ Zone → tatsächlicher Suchbereich  \n\n---\n\n## Bedeutung\n\nJe genauer die Expected\
  \ Zone:\n\n- desto effizienter das Routing\n- desto geringer der Overhead\n\n---\n"
