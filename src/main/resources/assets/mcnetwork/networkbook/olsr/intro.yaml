  # OLSR – Einführung

  ---
  
  **OLSR (Optimized Link State Routing)** ist ein **proaktives Routing-Protokoll**.

  ---
  
  ## Grundprinzip

  Routen werden **ständig aktuell gehalten**, unabhängig davon, ob sie gerade benötigt werden.

  ---
  
  ## Unterschied zu AODV / DSR / LAR

  - Diese sind **reaktiv** → suchen Routen bei Bedarf  
  - OLSR ist **proaktiv** → kennt Routen jederzeit  
  
  ## Konsequenz

  - Sofortige Kommunikation möglich
  - Kein initialer Suchprozess notwendig
  - Dauerhafte Kommunikation zwischen Knoten im Netz

  ---