"content": "# Zusammenfassung\n\n---\n\nOLSR verhält sich als proaktives Protokol\
  \ anders als die vorher besprochenen reaktive Protokolle.\n\n---\n\n## Eigenschaften\n\
  \n| Eigenschaft | Bewertung |\n|------------|----------|\n| Overhead | Hoch (stä\
  ndige Updates) |\n| Reaktionszeit | Sehr schnell (nach Aufbau der Topologie) |\n\
  | Stabilität | Hoch |\n| Skalierung | Gut durch MPR |\n\n---\n  \n## Beobachtungen\
  \ in MCNetwork\n\n- Sofortige Kommunikation möglich\n- Hohe Grundlast durch Updates\n\
  - Stabil bei häufiger Kommunikation\n\n---\n\n## Einordnung\n\nOLSR eignet sich\
  \ besonders für:\n\n- Netzwerke mit konstantem Traffic, in denen es einen 'Backbone'\
  \ gibt\n"
