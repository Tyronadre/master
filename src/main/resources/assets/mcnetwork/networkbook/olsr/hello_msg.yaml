  # Hello Messages

  ---
  
  OLSR verwendet **Hello Messages**, um Nachbarn zu erkennen.

  ---
  
  ## Funktion

  - Knoten senden regelmäßig kurze Nachrichten
  - Nachbarn werden identifiziert
  - Verbindungen werden überprüft

  ---
  
  ![Knoten senden kleine Nachrichten an ihre direkten Nachbarn](image:olsr_hello_messages)

  ---
  
  ## Ergebnis

  Jeder Knoten kennt seine **direkten Verbindungen**.

  ---
  
  ## Bedeutung

  Diese Information ist die Grundlage für:

  - Netzwerkkarte
  - Routingberechnung

  ---
  
