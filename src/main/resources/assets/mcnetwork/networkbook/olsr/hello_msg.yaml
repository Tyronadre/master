"content": "# Hello Messages\n\n---\n\nOLSR verwendet **Hello Messages**, um Nachbarn\
  \ zu erkennen.\n\n![Hello Message](hello_msg.png)\n\n---\n\nIn regelmäßigen Abstä\
  nden senden Nodes **HELLO** Pakete an alle Nachbarn. Diese haben immer eine TTL\
  \ von 1.\nWenn eine Node A initialisiert wird, ist der RoutingTable zunächst leer.\
  \ Sobald ein HELLO Paket empfangen wird, speichert die Node die Verbindung zu diesem\
  \ Nachbarn B als unidirektionalen Link ab. \nDa HELLO Pakete immer mit einer TTL\
  \ von 1 gesendet werden, muss ein Empfangenes zwingend von einem direkten Nachbarn\
  \ kommen.\nSendet die Node A nun selber ein HELLO Paket, wird in diesem gespeichert,\
  \ das eine unidirektionale Verbindung zu Nachbar B bekannt ist.\nWird dieses von\
  \ Node B empfangen, wird in Node B gespeichert das ein bidirektionale Verbindung\
  \ zu Node A besteht. \nMit dem nächsten gesendeten HELLO, ist dies auch Node A bekannt.\n\
  \nIm HUD wird folgendes dargestellt: \n- `VTime`: Wie lange ein Eintrag der wegen\
  \ diesem Paket entsteht gespeichert wird.\n- `SeqNum`: Zur Identifikation des Pakets,\
  \ um Flooding zu limitieren.\n- `HTime`: Intervall des Senders zum senden von HELLO\
  \ Messages\n- Eine List von Nachbarn jeweils mit `Will`, `Neigh.` (Was für eine\
  \ Art von Nachbar), `Link` (was für ein Linktyp zu diesem Nachbarn besteht), `Addresses`\
  \ (Die Addressen von allen Nachbarn die vorherige Typen besitzen)\n\n`Will` kann\
  \ in OLSR genutzt werden, damit bestimmte Routen präferiert werden. Z.B. kann eine\
  \ Node die wenig Batterie hat, `Will`auf NEVER setzten, und wird somit niemals zum\
  \ weiterleiten von Paketen benutzt. In der Simulation ist `Will` immer auf DEFAULT\
  \ gesetzt.\n\n---\n\nZusätzlich zu der Funktion Verbindungen zu direkten Nachbarn\
  \ festzustellen, werden von Node B auch Informationen zu allen dessen Nachbarn weitergeben.\
  \ Somit kennt Node A auch alle Nachbarn von Node B durch die HELLO Pakete.\nDiese\
  \ Nachbarn werden als 2-Hop-Neighbors gespeichert.\n\n---\n\nUm weitere Verbindungen\
  \ herstellen zu können, werden aus den 2-Hop-Neighbors Multipoint Relay Nodes ausgewä\
  hlt (MPRs).\n\nDie MPRs einer Node werden so gewählt, dass alle bekannten 2-Hop-Neighbors\
  \ über möglichst wenig bekannte Nachbarn erreicht werden können. Die Liste dieser\
  \ Nachbarn ist das MPR-Set einer Node.\n\nDas Set wird im HUD des Protokols unter\
  \ `MPRSet` angezeigt.\n\n![HUD mit MPR Set](node_1.png)\n\nIm HELLO wird angegeben\
  \ wenn ein Nachbar als MPR ausgewählt wurde. Wenn Node A, Node B als MPR wählt,\
  \ um eine dahinter liegende Node C zu erreichen, dann ist wird dies in den HELLO\
  \ Paketen von Node A angegeben. \n\nSomit weiß auch Node B, dass Node A diese als\
  \ MPR gewählt hat. Diese Informationen werden im MPR-Selector-Set gespeichert, das\
  \ für die zweite Art von RoutingPaket genutzt wird.\n\nDas Set wird im HUD des Protokolls\
  \ unter `MPRSelectorSet` angezeigt.\n\n![HUD mit MPR Selector Set](node_2.png)\n\
  \n---\n\n# Aufgaben\n\n1. Setze das genutze Protokol mit dem Simulation Controller\
  \ auf OLSR. Baue zum Testen zunächst ein einfaches Netzwerk mit nur 2 Nodes auf.\
  \ Du solltest nun sehen, das beide Nodes ab und zu HELLO Pakete versenden. \n2.\
  \ Füge nun eine Node so hinzu das sie in Kommunikationsreichweite von beiden Nodes\
  \ ist, und beobachte was passiert. \n3. Baue diese Node ab, und beobachte wie das\
  \ Protokol mit dem Verlust dieses Links umgeht.\n4. Beobachte, wie sich das Netzwerk\
  \ verhält wenn du diese Node außerhalb der Reichweite von einer der beiden Nodes\
  \ setzt.\n\n---\n"
