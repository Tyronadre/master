content: |
  # Hello Messages

  ---
  
  OLSR verwendet **Hello Messages**, um Nachbarn zu erkennen.

  ![Hello Message](hello_msg.png)

  ---
  
  Wenn eine Node A initialisiert wird, ist der RoutingTable zunächst leer. Sobald ein HELLO Paket empfangen wird, speichert die Node die Verbindung zu diesem Nachbarn B als asymmetrischen Link ab. 
  Da HELLO Pakete immer mit einer TTL von 1 gesendet werden, muss ein Empfangenes zwingend von einem direkten Nachbarn kommen.
  Sendet die Node A nun selber ein HELLO Paket, wird in diesem gespeichert, das eine asymmetrische Verbindung zu Nachbar B bekannt ist.
  Wird dieses von Node B empfangen, wird in Node B gespeichert das ein symmetrische Verbindung zu Node A besteht. 
  Mit dem nächsten gesendeten HELLO, ist dies auch Node A bekannt.
  
  ---
  
  Zusätzlich zu der Funktion Verbindungen zu direkten Nachbarn festzustellen, werden von Node B auch Informationen zu allen dessen Nachbarn weitergeben. Somit kennt Node A auch alle Nachbarn von Node B durch die HELLO Pakete.
  Diese Nachbarn werden als 2-Hop-Neighbors gespeichert.
  
  ---
  
  Um weitere Verbindungen herstellen zu können, werden aus den 2-Hop-Neighbors Multipoint Relay Nodes ausgewählt (MPRs).
  Die MPRs einer Node werden so gewählt, dass alle bekannten 2-Hop-Neighbors über möglichst wenig bekannte Nachbarn erreicht werden können. Die Liste dieser Nachbarn ist das MPR-Set einer Node.
  
  ![routing 1](node_1.png)
  
  Im HELLO wird angegeben wenn ein Nachbar als MPR ausgewählt wurde. Wenn Node A, Node B als MPR wählt, um eine dahinter liegende Node C zu erreichen, dann ist wird dies in den HELLO Paketen von Node A angegeben. 
  Somit weiß auch Node B, dass Node A diese als MPR gewählt hat. Diese Informationen werden im MPR-Selector-Set gespeichert, das für die zweite Art von RoutingPaket genutzt wird.
  
  ![routing 2](node_2.png)
  
  ---
  
  # Aufgabe
  
  Setze das genutze Protokol mit dem NetzwerkSimulator auf OLSR.
  Baue zum testen zunächst ein einfaches Netzwerk mit nur 2 Nodes auf. Du solltest nun sehen, das beide Nodes ab und zu HELLO Pakete versenden. 
